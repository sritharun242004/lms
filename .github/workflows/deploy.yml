name: Deploy LMS to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 836471808669.dkr.ecr.us-east-1.amazonaws.com
  WEB_REPO: lms-web
  REALTIME_REPO: lms-realtime

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build + push web image
        run: |
          docker build -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_APP_URL=https://lms.thebotcompany.in \
            --build-arg NEXT_PUBLIC_SOCKET_URL=https://sock.lms.thebotcompany.in \
            -t $ECR_REGISTRY/$WEB_REPO:${{ steps.tag.outputs.image_tag }} \
            -t $ECR_REGISTRY/$WEB_REPO:latest .
          docker push $ECR_REGISTRY/$WEB_REPO:${{ steps.tag.outputs.image_tag }}
          docker push $ECR_REGISTRY/$WEB_REPO:latest

      - name: Build + push realtime image
        run: |
          docker build -f Dockerfile.realtime -t $ECR_REGISTRY/$REALTIME_REPO:${{ steps.tag.outputs.image_tag }} -t $ECR_REGISTRY/$REALTIME_REPO:latest .
          docker push $ECR_REGISTRY/$REALTIME_REPO:${{ steps.tag.outputs.image_tag }}
          docker push $ECR_REGISTRY/$REALTIME_REPO:latest

  # App Runner services with automatic ECR deployment enabled will pick up the
  # new :latest tag on their own. This step exists so the workflow can be
  # triggered manually to force a redeploy even without a code change.
  redeploy-app-runner:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger redeployment on each service (if it exists)
        run: |
          for svc in lms-web lms-realtime; do
            arn=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$svc'].ServiceArn | [0]" --output text 2>/dev/null || echo "None")
            if [ "$arn" != "None" ] && [ -n "$arn" ]; then
              echo "Redeploying $svc ($arn)"
              aws apprunner start-deployment --service-arn "$arn" || true
            else
              echo "Skipping $svc — service not created yet"
            fi
          done
